[build]
  functions = "netlify/functions"
  # Generera version.json automatiskt vid varje deploy
  command = "echo {\"version\":\"$(date +%s)\"} > version.json"
  publish = "."

# Förhindra cachning av version.json så iPaden alltid får senaste
[[headers]]
  for = "/version.json"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"

[[redirects]]
  # Detta gör anropen snyggare om du vill, men är inget krav.
  # Det gör att du kan anropa /api/analyze-stats istället för den långa sökvägen.
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200